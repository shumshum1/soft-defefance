<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>מבצעי - סימולטור פיזור חלקיקים</title>
<style>
:root{--bg:#0f1117;--surface:#181c26;--surface2:#1e2230;--text:#e8eaf0;--muted:#9ea8c2;--accent:#3a8fdd;--border:rgba(255,255,255,.12)}
*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--text);font-family:'Segoe UI',Arial,sans-serif;min-height:100vh;padding:86px 18px 18px}
.wrap{max-width:1400px;margin:0 auto}.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px}
.grid{display:grid;grid-template-columns:360px 1fr;gap:14px}.controls .row{margin-bottom:14px}.controls label{display:flex;justify-content:space-between;color:var(--muted);font-size:.88rem;margin-bottom:4px}
input[type=range]{width:100%}.btns{display:flex;gap:8px;flex-wrap:wrap}.btn{border:1px solid var(--border);background:var(--surface2);color:var(--text);padding:10px 14px;border-radius:8px;cursor:pointer}
.stats{margin-top:12px;border-top:1px dashed var(--border);padding-top:12px;display:grid;gap:8px}.s{background:var(--surface2);border:1px solid var(--border);padding:8px;border-radius:8px}.k{font-size:.75rem;color:var(--muted)}.v{font-weight:700}
canvas{width:100%;max-width:100%;height:auto;background:#000022;border:1px solid var(--border);border-radius:8px}.legend{margin-top:10px;font-size:.82rem;color:var(--muted);display:grid;gap:4px}
nav{position:fixed;top:0;left:0;right:0;z-index:999;background:rgba(7,17,31,.96);border-bottom:1px solid rgba(120,170,220,.18);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:space-between;padding:10px 24px;min-height:68px}
nav a{color:#a9bfd7;text-decoration:none;padding:8px 14px;border-radius:999px}nav a:hover{color:#7fd4ff}
@media (max-width:980px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<nav>
  <a href="index.html" style="color:#7fd4ff;font-weight:700">◈ Smart Atmospheric Shield</a>
  <div>
    <a href="כימיה.HTML">כימיה והדבקה</a><a href="softKill.HTML">אווירונאוטיקה</a><a href="מבצעי.HTML">מבצעי</a><a href="about.html">About</a>
  </div>
</nav>
<div class="wrap">
  <div class="card" style="margin-bottom:12px"><h1 style="font-size:1.2rem">סימולטור פיזור חלקיקים - מודל פיזיקלי מתוקן</h1><p style="color:var(--muted);margin-top:6px">העיצוב הותאם לשפה הוויזואלית של שאר הדפים, עם אותם צבעים/ניווט.</p></div>
  <div class="grid">
    <section class="card controls">
      <div class="row"><label><span>נפח מפזר ראשי (ליטר)</span><b id="primaryVolumeVal">65</b></label><input id="primaryVolume" type="range" min="30" max="100" value="65"></div>
      <div class="row"><label><span>רדיוס פיזור (מטר)</span><b id="dispersalRadiusVal">300</b></label><input id="dispersalRadius" type="range" min="100" max="1000" step="10" value="300"></div>
      <div class="row"><label><span>כמות מפזרים קטנים</span><b id="smallDispensersVal">100</b></label><input id="smallDispensers" type="range" min="50" max="500" step="10" value="100"></div>
      <div class="btns"><button class="btn" id="startBtn">התחל סימולציה</button><button class="btn" id="stopBtn">עצור</button><button class="btn" id="resetBtn">איפוס</button></div>
      <div class="stats">
        <div class="s"><div class="k">זמן</div><div class="v" id="timeStat">0 / 300 שניות</div></div>
        <div class="s"><div class="k">כיסוי</div><div class="v" id="coverageStat">0%</div></div>
        <div class="s"><div class="k">חלקיקים</div><div class="v" id="particlesStat">0</div></div>
      </div>
    </section>
    <section class="card"><canvas id="simCanvas" width="800" height="800"></canvas><div class="legend"><span>🔴 מפזר ראשי</span><span>🟡 מפזרים קטנים</span><span>כחול→אדום: ריכוז עולה</span></div></section>
  </div>
</div>
<script>
const st={primaryVolume:65,dispersalRadius:300,smallDispensers:100,isRunning:false,currentTime:0,coverage:0,matrix:null,dispensers:[],totalParticles:0};
const SIM=300,TIME_SCALE=.1,PARTICLE_DIAMETER=45e-6,INITIAL=1,SECOND=.25,PHASE=30,MIN_DENS=1000,CELL=5,PACK=.64;
const c=document.getElementById('simCanvas'),ctx=c.getContext('2d');let raf=null,start=0;
const $=id=>document.getElementById(id);
function calcRadius(t){return t<=PHASE?INITIAL*t:INITIAL*PHASE+SECOND*(t-PHASE)}
function totalParticles(){const r=PARTICLE_DIAMETER/2,v=(4/3)*Math.PI*r*r*r,tot=st.primaryVolume/1000;return (tot*PACK)/v}
function init(){st.totalParticles=totalParticles();const size=Math.ceil((st.dispersalRadius*2)/CELL);st.matrix=Array(size).fill().map(()=>Array(size).fill(0));st.dispensers=[];for(let i=0;i<st.smallDispensers;i++){const a=Math.random()*2*Math.PI,d=Math.sqrt(Math.random())*st.dispersalRadius;st.dispensers.push({x:d*Math.cos(a),y:d*Math.sin(a),particlesCount:st.totalParticles/st.smallDispensers});}}
function color(v){if(v<1e3)return 'rgba(0,0,255,.1)';if(v<1e4)return '#0088FF';if(v<1e5)return '#00FF88';if(v<1e6)return '#88FF00';if(v<1e7)return '#FFFF00';if(v<1e8)return '#FF8800';return '#FF0000'}
function recalc(){const size=st.matrix.length,center=Math.floor(size/2),m=Array(size).fill().map(()=>Array(size).fill(0));const diff=calcRadius(st.currentTime);st.dispensers.forEach(d=>{const mx=center+Math.round(d.x/CELL),my=center+Math.round(d.y/CELL),cr=Math.ceil(diff/CELL),sigma=Math.max(1,diff/3),norm=1/(2*Math.PI*sigma*sigma);for(let dy=-cr;dy<=cr;dy++)for(let dx=-cr;dx<=cr;dx++){const tx=mx+dx,ty=my+dy;if(tx<0||ty<0||tx>=size||ty>=size)continue;const rd=Math.hypot(dx*CELL,dy*CELL);if(rd<=diff)m[ty][tx]+=d.particlesCount*norm*Math.exp(-(rd*rd)/(2*sigma*sigma));}});st.matrix=m;let cov=0,tot=0;for(let y=0;y<size;y++)for(let x=0;x<size;x++){const rx=(x-center)*CELL,ry=(y-center)*CELL;if(Math.hypot(rx,ry)<=st.dispersalRadius){tot++;if(m[y][x]>=MIN_DENS)cov++;}}st.coverage=tot?cov/tot*100:0}
function draw(){ctx.fillStyle='#000022';ctx.fillRect(0,0,c.width,c.height);if(!st.matrix)return;const size=st.matrix.length,center=Math.floor(size/2),pp=Math.min(c.width,c.height)/size;for(let y=0;y<size;y++)for(let x=0;x<size;x++){const p=st.matrix[y][x];if(p>100){ctx.fillStyle=color(p);ctx.fillRect((x-center)*pp+c.width/2-pp/2,(y-center)*pp+c.height/2-pp/2,pp,pp)}}st.dispensers.forEach((d,i)=>{const px=c.width/2+(d.x/CELL)*pp,py=c.height/2+(d.y/CELL)*pp;ctx.fillStyle='#ffff00';ctx.beginPath();ctx.arc(px,py,3,0,2*Math.PI);ctx.fill();if(i<40){ctx.fillStyle='#fff';ctx.font='9px Arial';ctx.fillText(i+1,px,py-6)}});ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.beginPath();ctx.arc(c.width/2,c.height/2,(st.dispersalRadius/CELL)*pp,0,2*Math.PI);ctx.stroke();ctx.fillStyle='#f00';ctx.beginPath();ctx.arc(c.width/2,c.height/2,5,0,2*Math.PI);ctx.fill();}
function sync(){$('primaryVolumeVal').textContent=st.primaryVolume;$('dispersalRadiusVal').textContent=st.dispersalRadius;$('smallDispensersVal').textContent=st.smallDispensers;$('timeStat').textContent=`${Math.floor(st.currentTime)} / ${SIM} שניות`;$('coverageStat').textContent=st.coverage.toFixed(1)+'%';$('particlesStat').textContent=st.totalParticles?st.totalParticles.toExponential(2):'0';}
function anim(){if(!st.isRunning)return;st.currentTime=(Date.now()-start)*TIME_SCALE/1000;if(st.currentTime>=SIM){st.currentTime=SIM;st.isRunning=false;}recalc();draw();sync();raf=requestAnimationFrame(anim)}
$('startBtn').onclick=()=>{init();st.currentTime=0;st.isRunning=true;start=Date.now();sync();anim()};$('stopBtn').onclick=()=>{st.isRunning=false;if(raf)cancelAnimationFrame(raf)};$('resetBtn').onclick=()=>{st.isRunning=false;if(raf)cancelAnimationFrame(raf);st.currentTime=0;st.coverage=0;st.matrix=null;st.dispensers=[];st.totalParticles=0;ctx.fillStyle='#000022';ctx.fillRect(0,0,c.width,c.height);sync()};
['primaryVolume','dispersalRadius','smallDispensers'].forEach(id=>$(id).oninput=e=>{st[id]=+e.target.value;sync();});sync();
</script>
</body>
</html>
