<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מבצעי - סימולטור פיזור חלקיקים</title>
<style>
:root{--bg:#0f1117;--surface:#181c26;--surface2:#1e2230;--text:#e8eaf0;--muted:#9ea8c2;--border:rgba(255,255,255,.12)}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:'Segoe UI',Arial,sans-serif;padding:84px 18px 18px}
nav{position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(7,17,31,.96);border-bottom:1px solid rgba(120,170,220,.18);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:space-between;padding:10px 24px}
nav a{color:#a9bfd7;text-decoration:none;padding:8px 14px;border-radius:999px}nav a:hover{color:#7fd4ff}
.wrap{max-width:1400px;margin:0 auto}.grid{display:grid;grid-template-columns:360px 1fr;gap:14px}.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px}
label{display:block;color:var(--muted);font-size:.88rem;margin-bottom:4px}.row{margin-bottom:14px}input[type=range]{width:100%}
.btns{display:flex;gap:8px;flex-wrap:wrap}.btn{border:1px solid var(--border);background:var(--surface2);color:var(--text);padding:10px 14px;border-radius:8px;cursor:pointer}
.stat{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px;margin-top:8px}.k{font-size:.75rem;color:var(--muted)}
canvas{width:100%;height:auto;background:#000022;border:1px solid var(--border);border-radius:8px}
@media (max-width:980px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<nav><a href="index.html" style="color:#7fd4ff;font-weight:700">◈ Smart Atmospheric Shield</a><div><a href="כימיה.HTML">כימיה והדבקה</a><a href="softKill.HTML">אווירונאוטיקה</a><a href="מבצעי.HTML">מבצעי</a><a href="about.html">About</a></div></nav>
<div class="wrap">
<div class="card" style="margin-bottom:12px"><h2>סימולטור פיזור חלקיקים - מודל פיזיקלי מתוקן</h2></div>
<div class="grid">
<section class="card">
  <div class="row"><label>נפח מפזר ראשי: <span id="pvLbl">65</span> ליטר</label><input id="primaryVolume" type="range" min="30" max="100" value="65"></div>
  <div class="row"><label>רדיוס פיזור: <span id="drLbl">300</span> מטר</label><input id="dispersalRadius" type="range" min="100" max="1000" step="10" value="300"></div>
  <div class="row"><label>כמות מפזרים קטנים: <span id="sdLbl">100</span></label><input id="smallDispensers" type="range" min="50" max="500" step="10" value="100"></div>
  <div class="btns"><button class="btn" id="startBtn">התחל סימולציה</button><button class="btn" id="stopBtn">עצור</button><button class="btn" id="resetBtn">איפוס</button></div>
  <div class="stat"><div class="k">זמן</div><div id="timeTxt">0 / 300 שניות</div></div>
  <div class="stat"><div class="k">דיפוזיה נוכחית</div><div id="diffTxt">0 מטר</div></div>
  <div class="stat"><div class="k">קצב דיפוזיה</div><div id="rateTxt">1 מ'/שניה</div></div>
  <div class="stat"><div class="k">כיסוי שטח</div><div id="covTxt">0%</div></div>
  <div class="stat"><div class="k">חלקיקים</div><div id="partTxt">0</div></div>
</section>
<section class="card"><canvas id="simCanvas" width="800" height="800"></canvas></section>
</div>
</div>
<script>
const state={primaryVolume:65,dispersalRadius:300,smallDispensers:100,isRunning:false,currentTime:0,coverage:0,matrix:null,dispensers:[],totalParticles:0};
let animationRef=null,startTimeRef=null;
const SIMULATION_DURATION=300,TIME_SCALE=0.1,PARTICLE_DIAMETER=45e-6,INITIAL_DIFFUSION_RATE=1,SECONDARY_DIFFUSION_RATE=0.25,INITIAL_PHASE_DURATION=30,MIN_COVERAGE_DENSITY=1000,CELL_SIZE=5,PACKING_FRACTION=0.64;
const canvas=document.getElementById('simCanvas'),ctx=canvas.getContext('2d');
const $=id=>document.getElementById(id);
function calculateDiffusionRadius(time){if(time<=INITIAL_PHASE_DURATION)return INITIAL_DIFFUSION_RATE*time;const initialDistance=INITIAL_DIFFUSION_RATE*INITIAL_PHASE_DURATION;const additionalTime=time-INITIAL_PHASE_DURATION;return initialDistance+SECONDARY_DIFFUSION_RATE*additionalTime;}
function calculateTotalParticles(){const particleRadius=PARTICLE_DIAMETER/2;const particleVolume=(4/3)*Math.PI*Math.pow(particleRadius,3);const totalVolumeM3=state.primaryVolume/1000;const effectiveVolume=totalVolumeM3*PACKING_FRACTION;const total=effectiveVolume/particleVolume;console.log('particle total',total);return total;}
function initializeSimulation(){const total=calculateTotalParticles();state.totalParticles=total;const matrixSize=Math.ceil((state.dispersalRadius*2)/CELL_SIZE);const newMatrix=Array(matrixSize).fill().map(()=>Array(matrixSize).fill(0));const newDispensers=[];for(let i=0;i<state.smallDispensers;i++){const angle=Math.random()*2*Math.PI;const distance=Math.sqrt(Math.random())*state.dispersalRadius;const x=distance*Math.cos(angle),y=distance*Math.sin(angle);newDispensers.push({x,y,particlesCount:total/state.smallDispensers});}
state.matrix=newMatrix;state.dispensers=newDispensers;return {matrix:newMatrix,dispensers:newDispensers,total};}
function calculateDispersion(matrix,dispensers,currentTime){const diffusionRadius=calculateDiffusionRadius(currentTime);const matrixSize=matrix.length;const centerIndex=Math.floor(matrixSize/2);const newMatrix=Array(matrixSize).fill().map(()=>Array(matrixSize).fill(0));
let totalParticlesPlaced=0,maxConcentration=0;
dispensers.forEach(dispenser=>{const dispenserMatrixX=centerIndex+Math.round(dispenser.x/CELL_SIZE);const dispenserMatrixY=centerIndex+Math.round(dispenser.y/CELL_SIZE);const cellRadius=Math.ceil(diffusionRadius/CELL_SIZE);let dispenserParticlesPlaced=0;const sigma=Math.max(1,diffusionRadius/3);const normalizationFactor=1/(2*Math.PI*Math.pow(sigma,2));
for(let dy=-cellRadius;dy<=cellRadius;dy++)for(let dx=-cellRadius;dx<=cellRadius;dx++){const targetX=dispenserMatrixX+dx,targetY=dispenserMatrixY+dy;if(targetX>=0&&targetX<matrixSize&&targetY>=0&&targetY<matrixSize){const realDistance=Math.sqrt((dx*CELL_SIZE)**2+(dy*CELL_SIZE)**2);if(realDistance<=diffusionRadius){const gaussianValue=Math.exp(-(realDistance**2)/(2*sigma**2));const particleDensity=(dispenser.particlesCount*normalizationFactor*gaussianValue);newMatrix[targetY][targetX]+=particleDensity;dispenserParticlesPlaced+=particleDensity*CELL_SIZE*CELL_SIZE;maxConcentration=Math.max(maxConcentration,newMatrix[targetY][targetX]);}}}
totalParticlesPlaced+=dispenserParticlesPlaced;});
console.log('placed',totalParticlesPlaced,'max',maxConcentration);return newMatrix;}
function calculateCoverage(matrix){const matrixSize=matrix.length,centerIndex=Math.floor(matrixSize/2);let coveredCells=0,totalCells=0;for(let y=0;y<matrixSize;y++)for(let x=0;x<matrixSize;x++){const realX=(x-centerIndex)*CELL_SIZE,realY=(y-centerIndex)*CELL_SIZE,d=Math.sqrt(realX**2+realY**2);if(d<=state.dispersalRadius){totalCells++;if(matrix[y][x]>=MIN_COVERAGE_DENSITY)coveredCells++;}}return totalCells>0?(coveredCells/totalCells)*100:0;}
function getColorForConcentration(c){if(c<1000)return 'rgba(0,0,255,0.1)';if(c<10000)return '#0088FF';if(c<100000)return '#00FF88';if(c<1000000)return '#88FF00';if(c<10000000)return '#FFFF00';if(c<100000000)return '#FF8800';return '#FF0000';}
function displayMatrix(matrix,dispensers){const width=canvas.width,height=canvas.height,centerX=width/2,centerY=height/2;ctx.fillStyle='#000022';ctx.fillRect(0,0,width,height);const matrixSize=matrix.length,centerIndex=Math.floor(matrixSize/2),pixelsPerCell=Math.min(width,height)/matrixSize;for(let y=0;y<matrixSize;y++)for(let x=0;x<matrixSize;x++){const particles=matrix[y][x];if(particles>100){ctx.fillStyle=getColorForConcentration(particles);const pixelX=(x-centerIndex)*pixelsPerCell+centerX-pixelsPerCell/2,pixelY=(y-centerIndex)*pixelsPerCell+centerY-pixelsPerCell/2;ctx.fillRect(pixelX,pixelY,pixelsPerCell,pixelsPerCell);if(particles>10000&&pixelsPerCell>8){ctx.fillStyle='#fff';ctx.font=`${Math.max(8,pixelsPerCell/3)}px Arial`;ctx.textAlign='center';const text=particles>1000000?`${(particles/1000000).toFixed(1)}M`:`${Math.floor(particles/1000)}K`;ctx.fillText(text,pixelX+pixelsPerCell/2,pixelY+pixelsPerCell/2+3);}}}
 dispensers.forEach((d,i)=>{const px=centerX+(d.x/CELL_SIZE)*pixelsPerCell,py=centerY+(d.y/CELL_SIZE)*pixelsPerCell;ctx.fillStyle='#ffff00';ctx.beginPath();ctx.arc(px,py,3,0,2*Math.PI);ctx.fill();ctx.fillStyle='#fff';ctx.font='10px Arial';ctx.fillText((i+1).toString(),px,py-8);});
ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.beginPath();ctx.arc(centerX,centerY,(state.dispersalRadius/CELL_SIZE)*pixelsPerCell,0,2*Math.PI);ctx.stroke();ctx.fillStyle='#f00';ctx.beginPath();ctx.arc(centerX,centerY,5,0,2*Math.PI);ctx.fill();ctx.fillStyle='#fff';ctx.font='14px Arial';ctx.textAlign='left';ctx.fillText(`זמן: ${Math.floor(state.currentTime)}s`,10,25);ctx.fillText(`דיפוזיה: ${calculateDiffusionRadius(state.currentTime).toFixed(1)}m`,10,45);ctx.fillText(`קצב: ${state.currentTime<=INITIAL_PHASE_DURATION?INITIAL_DIFFUSION_RATE:SECONDARY_DIFFUSION_RATE} מ'/ס`,10,65);ctx.fillText(`כיסוי: ${state.coverage.toFixed(1)}%`,10,85);
}
function animate(){if(!state.isRunning||!startTimeRef||!state.matrix||!state.dispensers.length)return;const elapsed=(Date.now()-startTimeRef)*TIME_SCALE;state.currentTime=elapsed;if(elapsed>=SIMULATION_DURATION){state.isRunning=false;state.currentTime=SIMULATION_DURATION;syncUI();return;}const newMatrix=calculateDispersion(state.matrix,state.dispensers,elapsed);state.coverage=calculateCoverage(newMatrix);displayMatrix(newMatrix,state.dispensers);syncUI();animationRef=requestAnimationFrame(animate);}
function startSimulation(){initializeSimulation();state.isRunning=true;state.currentTime=0;startTimeRef=Date.now();animationRef=requestAnimationFrame(animate);syncUI();}
function stopSimulation(){state.isRunning=false;if(animationRef)cancelAnimationFrame(animationRef)}
function resetSimulation(){stopSimulation();state.currentTime=0;state.coverage=0;state.matrix=null;state.dispensers=[];ctx.fillStyle='#000022';ctx.fillRect(0,0,canvas.width,canvas.height);syncUI();}
function syncUI(){ $('pvLbl').textContent=state.primaryVolume; $('drLbl').textContent=state.dispersalRadius; $('sdLbl').textContent=state.smallDispensers; $('timeTxt').textContent=`${Math.floor(state.currentTime)} / ${SIMULATION_DURATION} שניות`; $('diffTxt').textContent=calculateDiffusionRadius(state.currentTime).toFixed(1)+' מטר'; $('rateTxt').textContent=(state.currentTime<=INITIAL_PHASE_DURATION?INITIAL_DIFFUSION_RATE:SECONDARY_DIFFUSION_RATE)+" מ'/שניה"; $('covTxt').textContent=state.coverage.toFixed(1)+'%'; $('partTxt').textContent=state.totalParticles?state.totalParticles.toExponential(2):'0';}
$('primaryVolume').oninput=e=>{state.primaryVolume=parseInt(e.target.value);if(!state.isRunning)resetSimulation();syncUI();};$('dispersalRadius').oninput=e=>{state.dispersalRadius=parseInt(e.target.value);if(!state.isRunning)resetSimulation();syncUI();};$('smallDispensers').oninput=e=>{state.smallDispensers=parseInt(e.target.value);if(!state.isRunning)resetSimulation();syncUI();};
$('startBtn').onclick=startSimulation; $('stopBtn').onclick=stopSimulation; $('resetBtn').onclick=resetSimulation; resetSimulation();
</script>
</body>
</html>
