<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>דשבורד הנדסי - חדירת חלקיק דרך גל הלם</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Hebrew:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f1117;
      --panel: #171b23;
      --panel-border: #2a3140;
      --text: #e9eefc;
      --muted: #91a0bf;
      --accent: #3a8fdd;
      --accent-soft: rgba(58, 143, 221, 0.2);
      --warning: #ff9f43;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'IBM Plex Sans Hebrew', system-ui, sans-serif;
      background: radial-gradient(circle at 20% 10%, #1a2332 0%, var(--bg) 40%, #090b10 100%);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }

    .dashboard {
      width: min(1180px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
    }

    .panel {
      background: linear-gradient(160deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
      border: 1px solid var(--panel-border);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 12px 36px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(5px);
    }

    .header h1 {
      margin: 0 0 8px;
      font-size: clamp(1.2rem, 2.4vw, 1.9rem);
      font-weight: 700;
      color: #f4f8ff;
    }

    .header p {
      margin: 0;
      color: var(--muted);
      font-size: 0.98rem;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(300px, 420px) 1fr;
      gap: 18px;
    }

    .controls-wrap { display: grid; gap: 12px; }

    .control {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 14px;
      padding: 12px;
    }

    .control label {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
      font-weight: 500;
      color: #dbe6ff;
    }

    .value {
      color: #9fd3ff;
      font-weight: 700;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .equations {
      display: grid;
      gap: 8px;
      margin-top: 2px;
    }

    .eq {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      background: #101621;
      border: 1px solid #2a3650;
      border-radius: 10px;
      padding: 8px 10px;
      color: #d8e8ff;
      line-height: 1.55;
    }

    .eq .sym { color: #7fc5ff; }
    .eq .num { color: #ffd580; font-weight: 700; }

    .canvas-panel {
      background: #070a10;
      border: 1px solid #26324d;
      border-radius: 14px;
      padding: 8px;
      min-height: 360px;
      position: relative;
    }

    canvas {
      display: block;
      width: 100%;
      height: min(60vh, 470px);
      border-radius: 10px;
      background: radial-gradient(circle at 25% 50%, #101722 0%, #05070b 70%);
    }

    .legend {
      position: absolute;
      top: 14px;
      left: 14px;
      background: rgba(10, 13, 19, 0.8);
      border: 1px solid #2a3144;
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 0.78rem;
      color: #d4dff3;
      line-height: 1.5;
      pointer-events: none;
      max-width: 240px;
    }

    @media (max-width: 920px) {
      .layout { grid-template-columns: 1fr; }
      canvas { height: min(54vh, 390px); }
    }
  </style>
</head>
<body>
  <main class="dashboard">
    <section class="panel header">
      <h1>דשבורד אינטראקטיבי: חדירת חלקיק מרוכב (75μm) דרך גל הלם היפרסוני</h1>
      <p>כווננו את הפרמטרים בזמן אמת כדי לראות חישובים תרמיים + סימולציית Canvas דינמית של מעבר החלקיק עד לפגיעת דופן הטיל.</p>
    </section>

    <section class="layout">
      <aside class="controls-wrap">
        <div class="control">
          <label for="mach">
            <span>מהירות הטיל (Mach)</span>
            <span class="value" id="machValue">6.0</span>
          </label>
          <input id="mach" type="range" min="3" max="15" step="0.1" value="6" />
        </div>

        <div class="control">
          <label for="distance">
            <span>מרחק גל ההלם (ס״מ)</span>
            <span class="value" id="distanceValue">5.0</span>
          </label>
          <input id="distance" type="range" min="1" max="20" step="0.1" value="5" />
        </div>

        <div class="panel equations" aria-live="polite">
          <div class="eq" id="eqVelocity"></div>
          <div class="eq" id="eqTime"></div>
          <div class="eq" id="eqTemp"></div>
          <div class="eq" id="eqAblated"></div>
        </div>
      </aside>

      <section class="canvas-panel panel">
        <canvas id="simCanvas" width="900" height="480"></canvas>
        <div class="legend">
          • קיר ימין: דופן הטיל<br />
          • אזור צבעוני: גל ההלם (עובי לפי מרחק)<br />
          • נקודה בהירה: החלקיק<br />
          • עשן דק: אבלציה בתוך גל ההלם בלבד
        </div>
      </section>
    </section>
  </main>

  <script>
    const machSlider = document.getElementById('mach');
    const distanceSlider = document.getElementById('distance');

    const machValue = document.getElementById('machValue');
    const distanceValue = document.getElementById('distanceValue');

    const eqVelocity = document.getElementById('eqVelocity');
    const eqTime = document.getElementById('eqTime');
    const eqTemp = document.getElementById('eqTemp');
    const eqAblated = document.getElementById('eqAblated');

    const canvas = document.getElementById('simCanvas');
    const ctx = canvas.getContext('2d');

    let particleX = 40;
    let lastTs = performance.now();
    const trail = [];

    const state = {
      mach: Number(machSlider.value),
      distance: Number(distanceSlider.value),
      v: 0,
      t: 0,
      T: 0,
      ablated: 0,
    };

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function shockColor(temp) {
      const n = clamp((temp - 360) / (9000 - 360), 0, 1);
      const r = Math.round(lerp(255, 200, n));
      const g = Math.round(lerp(223, 235, n));
      const b = Math.round(lerp(70, 255, n));
      const alpha = lerp(0.35, 0.65, n);
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function format(n, d = 2) {
      return Number(n).toLocaleString('he-IL', { maximumFractionDigits: d, minimumFractionDigits: d });
    }

    function updateState() {
      state.mach = Number(machSlider.value);
      state.distance = Number(distanceSlider.value);
      state.v = state.mach * 310;
      state.t = (state.distance * 10) / state.v;
      state.T = 40 * state.mach * state.mach;
      state.ablated = (state.T / 1000) * state.t * 1.5;

      machValue.textContent = format(state.mach, 1);
      distanceValue.textContent = format(state.distance, 1);

      eqVelocity.innerHTML = `<span class="sym">v</span> = Mach × 310 = <span class="num">${format(state.v, 1)}</span> m/s`;
      eqTime.innerHTML = `<span class="sym">t</span> = (Distance × 10) / v = <span class="num">${format(state.t, 5)}</span> ms`;
      eqTemp.innerHTML = `<span class="sym">T</span> = 40 × Mach<sup>2</sup> = <span class="num">${format(state.T, 1)}</span> °C`;
      eqAblated.innerHTML = `ablated = (T / 1000) × t × 1.5 = <span class="num">${format(state.ablated, 6)}</span> μm`;
    }

    function drawScene(dt) {
      const w = canvas.width;
      const h = canvas.height;
      const wallX = w - 80;
      const wallWidth = 24;
      const zoneWidth = 35 + (state.distance - 1) / 19 * 280;
      const zoneStart = wallX - zoneWidth;
      const midY = h * 0.54;

      ctx.clearRect(0, 0, w, h);

      const gridAlpha = 0.06;
      ctx.strokeStyle = `rgba(90,120,170,${gridAlpha})`;
      ctx.lineWidth = 1;
      for (let x = 0; x < w; x += 40) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, h);
        ctx.stroke();
      }
      for (let y = 0; y < h; y += 40) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(w, y);
        ctx.stroke();
      }

      const col = shockColor(state.T);
      const glow = ctx.createLinearGradient(zoneStart, 0, wallX, 0);
      glow.addColorStop(0, 'rgba(255,215,70,0.08)');
      glow.addColorStop(0.6, col);
      glow.addColorStop(1, 'rgba(255,255,255,0.4)');

      ctx.fillStyle = glow;
      ctx.fillRect(zoneStart, 0, zoneWidth, h);

      ctx.fillStyle = '#9fb8d9';
      ctx.fillRect(wallX, 0, wallWidth, h);
      ctx.fillStyle = '#d8e4f6';
      ctx.fillRect(wallX + wallWidth - 4, 0, 4, h);

      const pxPerSec = 120 + state.mach * 45;
      particleX += pxPerSec * dt;
      if (particleX > wallX - 4) {
        particleX = 24;
        trail.length = 0;
      }

      const inShock = particleX >= zoneStart && particleX <= wallX;
      if (inShock) {
        trail.push({
          x: particleX - 3,
          y: midY + (Math.random() - 0.5) * 8,
          life: 1,
          size: 1 + Math.random() * 2.2,
        });
      }

      for (let i = trail.length - 1; i >= 0; i--) {
        const p = trail[i];
        p.life -= dt * 1.35;
        p.x -= (20 + state.mach * 4) * dt;
        if (p.life <= 0) trail.splice(i, 1);
      }

      for (const p of trail) {
        ctx.beginPath();
        ctx.fillStyle = `rgba(210, 220, 238, ${p.life * 0.38})`;
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.beginPath();
      ctx.fillStyle = '#f6fbff';
      ctx.shadowColor = inShock ? col : 'rgba(130,180,255,0.5)';
      ctx.shadowBlur = inShock ? 18 : 8;
      ctx.arc(particleX, midY, 5.4, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;

      ctx.strokeStyle = 'rgba(85, 130, 200, 0.65)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(16, midY + 16);
      ctx.lineTo(wallX + wallWidth + 2, midY + 16);
      ctx.stroke();
    }

    function tick(ts) {
      const dt = Math.min((ts - lastTs) / 1000, 0.033);
      lastTs = ts;
      drawScene(dt);
      requestAnimationFrame(tick);
    }

    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();
      const dpr = Math.max(window.devicePixelRatio || 1, 1);
      canvas.width = Math.floor(rect.width * dpr);
      canvas.height = Math.floor(rect.height * dpr);
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.scale(dpr, dpr);
    }

    machSlider.addEventListener('input', updateState);
    distanceSlider.addEventListener('input', updateState);
    window.addEventListener('resize', resizeCanvas);

    updateState();
    resizeCanvas();
    requestAnimationFrame((t) => {
      lastTs = t;
      tick(t);
    });
  </script>
</body>
</html>
